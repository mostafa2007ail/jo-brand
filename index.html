<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jo brand 1 - المتجر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #9a7a2e;
            --black: #0a0a0a; --dark: #111; --dark2: #1a1a1a; --dark3: #222;
            --white: #f5f0e8; --gray: #888; --card-bg: rgba(255, 255, 255, 0.03);
        }
        body { font-family: 'Cairo', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }
        .bg-grid { position: fixed; inset: 0; opacity: 0.03; z-index: 0; background-image: linear-gradient(var(--gold) 1px, transparent 1px), linear-gradient(90deg, var(--gold) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
        nav { position: sticky; top: 0; z-index: 50; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(201, 168, 76, 0.12); padding: 0 32px; height: 65px; display: flex; align-items: center; justify-content: space-between; }
        .nav-brand { font-size: 1.3rem; font-weight: 900; color: var(--gold); display: flex; align-items: center; gap: 8px; }
        .hero-banner { position: relative; z-index: 1; padding: 60px 32px 40px; text-align: center; background: linear-gradient(180deg, rgba(201, 168, 76, 0.06) 0%, transparent 100%); }
        .hero-banner h1 { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .hero-banner p { color: var(--gray); font-size: 1rem; }
        .search-wrap { position: relative; z-index: 1; max-width: 500px; margin: 0 auto 50px; padding: 0 20px; }
        .search-input { width: 100%; padding: 13px 20px 13px 46px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(201, 168, 76, 0.2); border-radius: 50px; color: var(--white); font-family: 'Cairo', sans-serif; font-size: 0.95rem; outline: none; transition: all 0.25s; }
        .search-input:focus { border-color: var(--gold); background: rgba(201, 168, 76, 0.05); }
        .search-icon { position: absolute; left: 36px; top: 50%; transform: translateY(-50%); color: var(--gray); font-size: 1rem; }
        .products-section { position: relative; z-index: 1; padding: 0 32px 60px; }
        .section-title { font-size: 1rem; font-weight: 700; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(201, 168, 76, 0.15); }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
        .product-card { background: var(--card-bg); border: 1px solid rgba(201, 168, 76, 0.1); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.3s; animation: fadeUp 0.5s ease both; }
        .product-card:hover { border-color: rgba(201, 168, 76, 0.4); transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); }
        .product-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--dark3); }
        .product-img-placeholder { width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, var(--dark2), var(--dark3)); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .product-info { padding: 16px; }
        .product-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; color: var(--white); }
        .product-category { font-size: 0.75rem; color: var(--gray); margin-bottom: 10px; }
        .product-price { font-size: 1.1rem; font-weight: 900; color: var(--gold); direction: ltr; display: inline-block; }
        .product-price::after { content: ' جنيه'; font-size: 0.75rem; color: var(--gray); font-weight: 400; }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--gray); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { nav { padding: 0 16px; } .products-section { padding: 0 16px 40px; } .hero-banner h1 { font-size: 1.8rem; } .products-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <nav>
        <div class="nav-brand">👑 jo brand 1</div>
    </nav>

    <div class="hero-banner">
        <h1>🛍️ أهلاً بك في متجرنا</h1>
        <p>اكتشف أحدث الموضة وأفخر التصاميم</p>
    </div>

    <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="search-input" type="text" placeholder="ابحث عن منتج..." oninput="renderProducts()" />
    </div>

    <div class="products-section">
        <div class="section-title">جميع المنتجات</div>
        <div class="products-grid" id="products-grid"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qispnunbwbuhehgsjbjr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpc3BudW5id2J1aGVoZ3NqYmpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTM3MjYsImV4cCI6MjA5NjIyOTcyNn0.G1n4TA8nDYGqjS6Be8FBKUE7l_pvKHqCi2J2I7NI--Y';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function getCategoryEmoji(cat) {
            const map = { 'تيشرت': '👕', 'بنطلون': '👖', 'جاكيت': '🧥', 'حذاء': '👟', 'شنطة': '👜', 'اكسسوار': '💍' };
            return map[cat] || '👗';
        }

        async function renderProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('products-grid');
            
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">⏳ جاري تحميل المنتجات...</div>`;

            const { data: products, error } = await sb.from('products').select('*').order('id', { ascending: false });

            if (error || !products) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">❌ فشل تحميل البيانات من السيرفر</div>`;
                return;
            }

            let filtered = products.filter(p => !query || p.name.toLowerCase().includes(query) || (p.category || '').toLowerCase().includes(query));

            if (!filtered.length) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>لا توجد نتائج مطابقة لـ بحثك</h3></div>`;
                return;
            }

            grid.innerHTML = filtered.map((p, i) => `
                <div class="product-card" style="animation-delay:${i * 0.06}s" onclick="location.href='product.html?id=${p.id}'">
                    ${p.image ? `<img class="product-img" src="${p.image}" alt="${p.name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">` : ''}
                    <div class="product-img-placeholder" style="${p.image ? 'display:none' : ''}">
                        ${getCategoryEmoji(p.category)}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.category || 'عام'}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price}</div>
                    </div>
                </div>
            `).join('');
        }

        renderProducts();
    </script>
</body>
</html>
